{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "iga.fullname" . }}
  labels:
    {{- include "iga.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "iga.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
